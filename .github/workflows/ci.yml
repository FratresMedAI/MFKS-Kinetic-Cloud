name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run FCU unit tests
        run: python -m pytest src/fire_control/test_fcu.py -v

      - name: Run ballistics model
        run: python research/ballistics/ballistics_model.py

      - name: Verify ballistics outputs exist
        run: test -f research/ballistics/ballistics_output.json && test -f research/ballistics/BALLISTICS_RESULTS.md
